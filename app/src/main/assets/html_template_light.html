<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <style>
        /* Sakura.css v1.5.0
         * ================
         * Minimal css theme.
         * Project: https://github.com/oxalorg/sakura/
         */
        /* Body */
        html {
          font-size: 62.5%;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
          -webkit-text-size-adjust: 100%;
          text-size-adjust: 100%;
        }

        :root {
          --accent-color: #1D7484;
          --accent-container-color: #D7EEF2;
          --accent-underline-color: rgba(29, 116, 132, 0.55);
          --on-accent-color: #FFFFFF;
          --on-accent-container-color: #123B43;
          --body-color: #4A4A4A;
          --body-bg: #F9F9F9;
          --blockquote-bg: #F1F1F1;
          --code-bg: #F1F1F1;
          --table-border-color: #F1F1F1;
          --input-color: #4A4A4A;
          --input-bg: #F1F1F1;
          --input-border-color: #F1F1F1;
          --link-color: #1D7484;
          --link-visited-color: #1D7484;
          --link-hover-color: #1D7484;
          --button-border-color: #1D7484;
          --annotation-active-outline-color: rgba(29, 116, 132, 0.7);
          --annotation-active-shadow-color: rgba(29, 116, 132, 0.18);
          --annotation-yellow-color: rgba(255, 235, 59, 0.4);
          --annotation-red-color: rgba(239, 83, 80, 0.35);
          --annotation-blue-color: rgba(66, 165, 245, 0.35);
          --annotation-green-color: rgba(102, 187, 106, 0.35);
          --annotation-none-underline-color: rgba(150, 150, 150, 0.6);
        }

        body {
          font-size: 1.95rem;
          line-height: 1.618;
          max-width: 100%;
          margin: auto;
          color: var(--body-color);
          background-color: var(--body-bg);
          padding: 13px;
        }

        h1, h2, h3, h4, h5, h6 {
          line-height: 1.18;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
          font-weight: 600;
          margin-top: 2.2rem;
          margin-bottom: 1.1rem;
          overflow-wrap: break-word;
          word-wrap: break-word;
          -ms-word-break: break-all;
          word-break: break-word;
        }

        h1 {
          font-size: 1.5em;
        }

        h2 {
          font-size: 1.32em;
        }

        h3 {
          font-size: 1.18em;
        }

        h4 {
          font-size: 1.08em;
        }

        h5 {
          font-size: 1em;
        }

        h6 {
          font-size: 0.94em;
        }

        p {
          margin-top: 0px;
          margin-bottom: 2.5rem;
        }

        small, sub, sup {
          font-size: 75%;
        }

        hr {
          border-color: var(--accent-color);
        }

        a {
          text-decoration: underline;
          text-decoration-color: var(--accent-underline-color);
          text-underline-offset: 0.12em;
          text-decoration-thickness: 1px;
          color: var(--link-color);
        }
        a:visited {
          color: var(--link-visited-color);
        }
        a:hover {
          color: var(--link-hover-color);
          text-decoration-color: var(--link-hover-color);
        }

        ul {
          padding-left: 1.4em;
          margin-top: 0px;
          margin-bottom: 2.5rem;
        }

        li {
          margin-bottom: 0.4em;
        }

        blockquote {
          margin-left: 0px;
          margin-right: 0px;
          padding-left: 1em;
          padding-top: 0.8em;
          padding-bottom: 0.8em;
          padding-right: 0.8em;
          border-left: 5px solid var(--accent-color);
          margin-bottom: 2.5rem;
          background-color: var(--blockquote-bg);
        }

        blockquote p {
          margin-bottom: 0;
        }

        img, video {
          height: auto;
          max-width: 100%;
          margin-top: 0px;
          margin-bottom: 2.5rem;
        }

        figure {
          margin: 0;
          margin-bottom: 2.5rem;
        }

        figure img {
          margin-bottom: 0.8rem;
        }

        figcaption, .picture-caption {
          font-size: 0.9em;
          color: var(--body-color);
          opacity: 0.8;
        }

        iframe {
          max-width: 100%;
          width: 100%;
          aspect-ratio: 16 / 9;
          border: none;
          margin-top: 0px;
          margin-bottom: 2.5rem;
        }

        .video-embed {
          position: relative;
          width: 100%;
          height: 0;
          padding-top: 56.25%;
          margin-top: 0px;
          margin-bottom: 2.5rem;
        }

        .video-embed iframe,
        .video-embed video {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border: none;
        }

        /* Pre and Code */
        pre {
          background-color: var(--code-bg);
          display: block;
          padding: 1em;
          overflow-x: auto;
          margin-top: 0px;
          margin-bottom: 2.5rem;
          font-size: 0.9em;
        }

        code, kbd, samp {
          font-size: 0.9em;
          padding: 0 0.5em;
          background-color: var(--code-bg);
          white-space: pre-wrap;
        }

        pre > code {
          padding: 0;
          background-color: transparent;
          white-space: pre;
          font-size: 1em;
        }

        /* Tables */
        table {
          text-align: justify;
          width: 100%;
          border-collapse: collapse;
          margin-bottom: 2rem;
        }

        td, th {
          padding: 0.5em;
          border-bottom: 1px solid var(--table-border-color);
        }

        /* Buttons, forms and input */
        input, textarea {
          border: 1px solid var(--input-color);
        }
        input:focus, textarea:focus {
          border: 1px solid var(--accent-color);
        }

        textarea {
          width: 100%;
        }

        .button, button, input[type=submit], input[type=reset], input[type=button], input[type=file]::file-selector-button {
          display: inline-block;
          padding: 5px 10px;
          text-align: center;
          text-decoration: none;
          white-space: nowrap;
          background-color: var(--accent-color);
          color: var(--on-accent-color);
          border-radius: 1px;
          border: 1px solid var(--button-border-color);
          cursor: pointer;
          box-sizing: border-box;
        }
        .button[disabled], button[disabled], input[type=submit][disabled], input[type=reset][disabled], input[type=button][disabled], input[type=file]::file-selector-button[disabled] {
          cursor: default;
          opacity: 0.5;
        }
        .button:hover, button:hover, input[type=submit]:hover, input[type=reset]:hover, input[type=button]:hover, input[type=file]::file-selector-button:hover {
          background-color: var(--accent-container-color);
          color: var(--on-accent-container-color);
          outline: 0;
        }
        .button:focus-visible, button:focus-visible, input[type=submit]:focus-visible, input[type=reset]:focus-visible, input[type=button]:focus-visible, input[type=file]::file-selector-button:focus-visible {
          outline-style: solid;
          outline-width: 2px;
        }

        textarea, select, input {
          color: var(--input-color);
          padding: 6px 10px; /* The 6px vertically centers text on FF, ignored by Webkit */
          margin-bottom: 10px;
          background-color: var(--input-bg);
          border: 1px solid var(--input-border-color);
          border-radius: 4px;
          box-shadow: none;
          box-sizing: border-box;
        }
        textarea:focus, select:focus, input:focus {
          border: 1px solid var(--accent-color);
          outline: 0;
        }

        input[type=checkbox]:focus {
          outline: 1px dotted var(--accent-color);
        }

        label, legend, fieldset {
          display: block;
          margin-bottom: 0.5rem;
          font-weight: 600;
        }

        /* Search highlighting for Search in Article feature */
        .mydeck-search-match {
            background-color: #FFFF00 !important;
            color: #000000 !important;
            border-radius: 2px;
            opacity: 0.6;
        }
        .mydeck-search-current {
            background-color: #FF8C00 !important;
            color: #000000 !important;
            border-radius: 2px;
            opacity: 0.6;
        }

        /* Readeck annotation/highlight rendering */
        rd-annotation {
            border-radius: 2px;
            padding: 1px 0;
            cursor: pointer;
            transition: box-shadow 180ms ease, outline-color 180ms ease;
        }
        rd-annotation[data-annotation-note]::after {
            content: " \270E";
            font-size: 0.75em;
            opacity: 0.6;
        }
        rd-annotation.mydeck-annotation-active {
            outline: 2px solid var(--annotation-active-outline-color);
            box-shadow: 0 0 0 2px var(--annotation-active-shadow-color);
        }
        rd-annotation[data-annotation-color="yellow"],
        rd-annotation:not([data-annotation-color]) {
            background-color: var(--annotation-yellow-color);
        }
        rd-annotation[data-annotation-color="red"] {
            background-color: var(--annotation-red-color);
        }
        rd-annotation[data-annotation-color="blue"] {
            background-color: var(--annotation-blue-color);
        }
        rd-annotation[data-annotation-color="green"] {
            background-color: var(--annotation-green-color);
        }
        rd-annotation[data-annotation-color="none"] {
            background-color: transparent;
            text-decoration: underline;
            text-decoration-color: var(--annotation-none-underline-color);
            text-underline-offset: 2px;
        }

    </style>
</head>
<body>
    <div class="container">
        %s
    </div>
</body>
</html>
