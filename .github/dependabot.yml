version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # Batch low-risk minor/patch bumps into one PR. Major version bumps
      # are intentionally left out of the group so each arrives as its own
      # PR for individual review.
      github-actions-minor:
        update-types:
          - "minor"
          - "patch"
