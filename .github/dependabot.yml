version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # Batch low-risk minor/patch bumps into one PR. Major version bumps
      # are intentionally left out of the group so each arrives as its own
      # PR for individual review.
      github-actions-minor:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # gradle/actions v6 moved the caching engine to a proprietary,
      # commercially-licensed component (Gradle Terms of Use). Stay on the
      # last fully-MIT major (v5.x). Revisit only as a deliberate decision.
      - dependency-name: "gradle/actions"
        update-types:
          - "version-update:semver-major"
