name: Snapshot Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # 07:23 UTC daily. Cron is UTC and does not observe DST shifts.
    - cron: '23 7 * * *'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: snapshot-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-snapshot:
    if: github.event_name != 'schedule' || github.repository == 'NateEaton/mydeck-android'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c  # v5.0.2

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407  # v3.2.2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set Build Vars
        id: build_vars
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BUILD_TYPE="debug"
          else
            BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          fi
          if [ "$BUILD_TYPE" = "debug" ]; then
            echo "GRADLE_TASK=assembleGithubSnapshotDebug" >> "$GITHUB_OUTPUT"
            echo "APK_DIR=debug" >> "$GITHUB_OUTPUT"
            echo "VERSION_SUFFIX=-debug" >> "$GITHUB_OUTPUT"
          else
            echo "GRADLE_TASK=assembleGithubSnapshotRelease" >> "$GITHUB_OUTPUT"
            echo "APK_DIR=release" >> "$GITHUB_OUTPUT"
            echo "VERSION_SUFFIX=" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode Keystore
        if: github.event_name != 'pull_request' && steps.build_vars.outputs.APK_DIR == 'release'
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > ${{ github.workspace }}/keystore.jks

      - name: Set Version Vars
        id: set_env
        run: |
          echo "TIMESTAMP=$(date +%Y%m%dT%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Snapshot APK (debug, no signing env)
        if: github.event_name == 'pull_request' || steps.build_vars.outputs.APK_DIR == 'debug'
        run: ./gradlew assembleGithubSnapshotDebug
        env:
          SNAPSHOT_VERSION_NAME: ${{ steps.set_env.outputs.TIMESTAMP }}-${{ steps.set_env.outputs.COMMIT_SHA }}-debug

      - name: Build Snapshot APK (signed release)
        if: github.event_name != 'pull_request' && steps.build_vars.outputs.APK_DIR == 'release'
        run: ./gradlew assembleGithubSnapshotRelease
        env:
          SNAPSHOT_VERSION_NAME: ${{ steps.set_env.outputs.TIMESTAMP }}-${{ steps.set_env.outputs.COMMIT_SHA }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE: ${{ github.workspace }}/keystore.jks

      - name: Remove keystore
        if: always() && github.event_name != 'pull_request' && steps.build_vars.outputs.APK_DIR == 'release'
        run: rm -f "${{ github.workspace }}/keystore.jks"

      - name: Create Checksum
        id: create_checksum
        run: |
          FILENAME=$(echo app/build/outputs/apk/githubSnapshot/${{ steps.build_vars.outputs.APK_DIR }}/*.apk)
          sha256sum $FILENAME > checksums.txt
          echo "ARTIFACT_FILENAME=$FILENAME" >> "$GITHUB_OUTPUT"

      # Every run produces a tester-downloadable snapshot artifact.
      # PR runs use 30-day retention so reviewers have time to install and test;
      # main / schedule / dispatch use 7-day retention.
      - name: Upload PR Debug APK Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: tester-snapshot-${{ steps.build_vars.outputs.APK_DIR }}
          path: |
            ${{ steps.create_checksum.outputs.ARTIFACT_FILENAME }}
            checksums.txt
          retention-days: 30

      - name: Upload Snapshot Artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: tester-snapshot-${{ steps.build_vars.outputs.APK_DIR }}
          path: |
            ${{ steps.create_checksum.outputs.ARTIFACT_FILENAME }}
            checksums.txt
          retention-days: 7

  publish-latest-snapshot:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule'
    needs: build-snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download Snapshot Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: tester-snapshot-release
          path: ./artifacts

      - name: Compute Source Line
        id: source
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TIMESTAMP="$(date -u '+%Y-%m-%d %H:%M UTC')"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            LINE="**Source:** scheduled nightly @ \`${SHORT_SHA}\` — ${TIMESTAMP}"
          else
            LINE="**Source:** main push @ \`${SHORT_SHA}\` — ${TIMESTAMP}"
          fi
          echo "SOURCE_LINE=${LINE}" >> "$GITHUB_OUTPUT"

      - name: Move latest-snapshot tag
        # Replaces joutvhu/create-tag@v1, whose ref-probe converted any
        # getRef error into a create-ref attempt and produced an
        # intermittent "Reference already exists" failure. This step
        # fails closed: it only enters the create path on a confirmed
        # HTTP 404 from the probe. Any other probe error stops the job.
        # NOTE: the 404 check matches the gh CLI's stderr error format
        # (`gh: HTTP 404: …`). Revisit if gh changes that format.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REF="tags/latest-snapshot"
          FULL_REF="refs/${REF}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"

          err="${RUNNER_TEMP}/latest-snapshot-ref.err"
          if gh api "repos/${REPO}/git/ref/${REF}" >/dev/null 2>"${err}"; then
            echo "latest-snapshot exists; moving to ${SHA}"
            gh api -X PATCH "repos/${REPO}/git/refs/${REF}" \
              -f "sha=${SHA}" -F "force=true"
          elif grep -q "HTTP 404" "${err}"; then
            echo "latest-snapshot is missing; creating at ${SHA}"
            gh api -X POST "repos/${REPO}/git/refs" \
              -f "ref=${FULL_REF}" -f "sha=${SHA}"
          else
            cat "${err}" >&2
            exit 1
          fi

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@440c8c1cb0ed28b9f43e4d1d670870f059653174  # v1.16.0
        with:
          allowUpdates: true
          prerelease: true
          name: MyDeck Continuous Snapshot
          body: |
            This is an automated snapshot build. It is a **Release-optimized** build but uses a separate package ID so it can be installed alongside your production version.

            ${{ steps.source.outputs.SOURCE_LINE }}
          commit: ${{ github.sha }}
          tag: latest-snapshot
          removeArtifacts: true
          omitDraftDuringUpdate: true
          artifacts: "./artifacts/**/*.apk,./artifacts/checksums.txt"
          token: ${{ secrets.GITHUB_TOKEN }}
