name: Debug Snapshot Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build from'
        required: false
        default: 'main'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-debug-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set Version Vars
        id: set_env
        run: |
          echo "TIMESTAMP=$(date +%Y%m%dT%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Debug Snapshot APK
        run: ./gradlew assembleGithubSnapshotDebug
        env:
          SNAPSHOT_VERSION_NAME: ${{ steps.set_env.outputs.TIMESTAMP }}-${{ steps.set_env.outputs.COMMIT_SHA }}-debug

      - name: Create Checksum
        id: create_checksum
        run: |
          FILENAME=$(echo app/build/outputs/apk/githubSnapshot/debug/*.apk)
          sha256sum $FILENAME > checksums.txt
          echo "ARTIFACT_FILENAME=$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Upload Debug Snapshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tester-debug-snapshot
          path: |
            ${{ steps.create_checksum.outputs.ARTIFACT_FILENAME }}
            checksums.txt
          retention-days: 14
