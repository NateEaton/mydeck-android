name: Quality Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '17.0.13'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble Debug Variants
        run: ./gradlew :app:assembleDebugAll

      - name: Run Lint
        run: ./gradlew :app:lintDebugAll

      - name: Run Tests
        run: ./gradlew :app:testDebugUnitTestAll

      - name: Upload JVM crash logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: jvm-crash-logs
          path: |
            **/hs_err_pid*.log
            **/replay_pid*.log
            **/core.*
          if-no-files-found: ignore
          retention-days: 14
